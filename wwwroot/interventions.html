<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interventions — ProgettoAlex</title>
  <meta name="description" content="Manage your assigned interventions — list and calendar views">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1E1E2E;
      --card: #2A2A3C;
      --border: #353548;
      --accent: #3B82F6;
      --text: #F1F1F1;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      --text-dim: #4A4A5A;
      --status-planned: #4A4A5A;
      --status-assigned: #8B5CF6;
      --status-inprogress: #3B82F6;
      --status-onhold: #F59E0B;
      --status-completed: #22C55E;
      --status-cancelled: #EF4444;
      --radius: 14px;
      --radius-sm: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
    /* ── UTILITIES ── */
    .hidden { display: none !important; }
    /* ── LOGIN ── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-box { width: 100%; max-width: 400px; }
    .login-brand { text-align: center; margin-bottom: 40px; }
    .login-icon {
      width: 64px; height: 64px; background: var(--accent);
      border-radius: 16px; display: flex; align-items: center;
      justify-content: center; font-size: 28px; margin: 0 auto 16px;
    }
    .login-brand h1 { font-size: 28px; font-weight: 700; }
    .login-brand p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-secondary); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 14px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-family: inherit; font-size: 15px;
      outline: none; transition: border-color .2s;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--accent);
      border: none; border-radius: var(--radius-sm); color: white;
      font-family: inherit; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity .2s; margin-top: 8px;
    }
    .login-btn:hover { opacity: .9; }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }
    .login-error {
      background: #3C1A1A; border: 1px solid var(--status-cancelled);
      border-radius: 10px; padding: 10px 12px; color: var(--status-cancelled);
      font-size: 13px; text-align: center; margin-top: 12px;
    }
    /* ── APP LAYOUT ── */
    #appScreen { display: none; flex-direction: column; height: 100vh; }
    /* ── HEADER ── */
    .app-header {
      padding: 20px 24px 8px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .app-header h1 { font-size: 24px; font-weight: 700; }
    .app-header .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .badge-count {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 6px 14px;
      font-size: 13px; color: var(--text-secondary);
    }
    .logout-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 6px 14px;
      color: var(--text-secondary); font-family: inherit; font-size: 13px;
      cursor: pointer; transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--status-cancelled); color: var(--status-cancelled); }
    /* ── VIEW TOGGLE ── */
    .view-toggle {
      margin: 8px 24px 12px; display: flex; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 4px; gap: 4px;
    }
    .toggle-btn {
      flex: 1; padding: 8px; border: none; border-radius: 10px;
      background: transparent; color: var(--text-secondary);
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    .toggle-btn.active { background: var(--accent); color: white; font-weight: 600; }
    /* ── LIST VIEW ── */
    .list-container { flex: 1; overflow-y: auto; padding: 4px 24px 24px; }
    .list-container::-webkit-scrollbar { width: 4px; }
    .list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .intervention-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
      cursor: pointer; transition: border-color .2s, transform .15s;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
    }
    .intervention-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .card-title {
      font-size: 16px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .status-badge {
      padding: 4px 10px; border-radius: 10px; font-size: 11px;
      font-weight: 600; color: white; white-space: nowrap; flex-shrink: 0;
    }
    .card-meta { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .meta-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
    .empty-state {
      text-align: center; padding: 60px 20px;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .empty-state p { color: var(--text-secondary); font-size: 14px; }
    /* ── CALENDAR VIEW ── */
    .calendar-container { flex: 1; overflow-y: auto; padding: 0 24px 24px; }
    .cal-nav-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px 12px; margin-bottom: 12px;
    }
    .cal-nav-btn {
      width: 38px; height: 38px; background: var(--border); border: none;
      border-radius: 10px; color: var(--text); font-size: 14px;
      cursor: pointer; transition: background .2s; display: flex;
      align-items: center; justify-content: center;
    }
    .cal-nav-btn:hover { background: var(--accent); }
    .cal-month-label { font-size: 18px; font-weight: 700; }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 4px; margin-bottom: 4px; padding: 0 4px;
    }
    .cal-weekday {
      text-align: center; font-size: 11px; font-weight: 600;
      color: var(--text-muted); padding: 4px 0; text-transform: uppercase;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      border-radius: 10px; cursor: pointer; transition: background .15s;
      position: relative; font-size: 13px; font-weight: 500;
    }
    .cal-day:hover { background: rgba(59,130,246,.15); }
    .cal-day.other { color: var(--text-dim); }
    .cal-day.today { border: 1.5px solid var(--accent); }
    .cal-day.selected { background: var(--accent); color: white; }
    .cal-day.selected.today { border-color: transparent; }
    .cal-dots { display: flex; gap: 3px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
    .cal-day.selected .cal-dot { background: white; }
    .cal-dot.green { background: var(--status-completed); }
    .cal-day.selected .cal-dot.green { background: white; }
    .selected-day-label {
      font-size: 15px; font-weight: 600; color: var(--text-secondary);
      margin: 16px 4px 8px;
    }
    .daily-list { display: flex; flex-direction: column; gap: 8px; }
    .daily-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.2);
      transition: border-color .2s;
    }
    .daily-card:hover { border-color: var(--accent); }
    .daily-card-info { flex: 1; min-width: 0; }
    .daily-card-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .daily-card-loc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; display: flex; align-items: center; gap: 5px; }
    .daily-badge { font-size: 10px; }
    /* ── RESPONSIVE ── */
    @media(max-width:600px) {
      .app-header { padding: 16px 16px 6px; }
      .app-header h1 { font-size: 20px; }
      .view-toggle { margin: 6px 16px 10px; }
      .list-container, .calendar-container { padding-left: 16px; padding-right: 16px; }
    }
    /* ── LOADING ── */
    .spinner {
      width: 24px; height: 24px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .6s linear infinite; margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-icon">🔧</div>
      <h1>ProgettoAlex</h1>
      <p>Sign in to manage your interventions</p>
    </div>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" class="form-input" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="passwordInput">Password</label>
        <div style="position: relative;">
          <input type="password" id="passwordInput" class="form-input" placeholder="Enter your password" required autocomplete="current-password" style="padding-right: 40px;">
          <button type="button" onclick="togglePassword()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 16px;">
            👁
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      <div id="loginError" class="login-error hidden"></div>
    </form>
    <p style="text-align:center;color:var(--text-dim);font-size:12px;margin-top:32px;">Industrial Intervention Manager</p>
  </div>
</div>

<!-- ═══ APP SCREEN ═══ -->
<div id="appScreen">
  <!-- Header -->
  <div class="app-header">
    <div>
      <h1>My Interventions</h1>
      <div class="subtitle">Manage your tasks</div>
    </div>
    <div class="header-actions">
      <span class="badge-count" id="itemCount">0 items</span>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
  </div>

  <!-- View Toggle -->
  <div class="view-toggle">
    <button class="toggle-btn active" id="btnList" onclick="switchView('list')">📋 List</button>
    <button class="toggle-btn" id="btnCalendar" onclick="switchView('calendar')">📅 Calendar</button>
  </div>

  <!-- List View -->
  <div class="list-container" id="listView">
    <div id="listContent"></div>
  </div>

  <!-- Calendar View -->
  <div class="calendar-container hidden" id="calendarView">
    <div class="cal-nav-bar">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
      <span class="cal-month-label" id="calMonthLabel"></span>
      <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-weekdays">
      <div class="cal-weekday">Mon</div><div class="cal-weekday">Tue</div>
      <div class="cal-weekday">Wed</div><div class="cal-weekday">Thu</div>
      <div class="cal-weekday">Fri</div><div class="cal-weekday">Sat</div>
      <div class="cal-weekday">Sun</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="selected-day-label" id="selectedDayLabel"></div>
    <div class="daily-list" id="dailyList"></div>
  </div>
</div>

<script>
// ── API BASE URL ──
// Note: Since this HTML is served from the backend's wwwroot, relative paths like '/api/...' work automatically both locally and on Render.
// If you host this frontend separately, change these relative URLs to absolute URLs (e.g., 'https://your-app-name.onrender.com/api/...').

// ═══ STATE ═══
let token = localStorage.getItem('jwt_token') || '';
let interventions = [];
let currentMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let selectedDate = null;

// ═══ STATUS HELPERS (shared logic — mirrors MAUI converters) ═══
const STATUS_COLORS = {
  Planned: '#4A4A5A', Assigned: '#8B5CF6', InProgress: '#3B82F6',
  OnHold: '#F59E0B', Completed: '#22C55E', Cancelled: '#EF4444'
};
const STATUS_LABELS = {
  Planned: 'Planned', Assigned: 'Assigned', InProgress: 'In Progress',
  OnHold: 'On Hold', Completed: 'Completed', Cancelled: 'Cancelled'
};
const STATUS_ICONS = {
  Planned: '⏳', Assigned: '👤', InProgress: '🔧',
  OnHold: '⏸', Completed: '✅', Cancelled: '❌'
};

function getStatusColor(s) { return STATUS_COLORS[s] || '#4A4A5A'; }
function getStatusLabel(s) { return STATUS_LABELS[s] || s; }
function getStatusIcon(s) { return STATUS_ICONS[s] || '❔'; }

// ═══ INIT ═══
if (token) { showApp(); loadInterventions(); } else { document.getElementById('loginScreen').style.display = 'flex'; }

// ═══ AUTH ═══
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  btn.disabled = true; btn.textContent = 'Signing in…';
  errEl.classList.add('hidden');
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('emailInput').value.trim(),
        password: document.getElementById('passwordInput').value
      })
    });
    if (!res.ok) { throw new Error('Invalid credentials'); }
    const data = await res.json();
    token = data.token;
    localStorage.setItem('jwt_token', token);
    showApp();
    loadInterventions();
  } catch (err) {
    errEl.textContent = err.message || 'Login failed';
    errEl.classList.remove('hidden');
  } finally { btn.disabled = false; btn.textContent = 'Sign In'; }
}

function handleLogout() {
  token = '';
  localStorage.removeItem('jwt_token');
  interventions = [];
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('emailInput').value = '';
  document.getElementById('passwordInput').value = '';
}

function togglePassword() {
  const pwd = document.getElementById('passwordInput');
  const btn = event.currentTarget;
  if (pwd.type === 'password') {
    pwd.type = 'text';
    btn.textContent = '👁‍🗨';
  } else {
    pwd.type = 'password';
    btn.textContent = '👁';
  }
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
}

// ═══ DATA ═══
async function loadInterventions() {
  const container = document.getElementById('listContent');
  container.innerHTML = '<div class="spinner"></div>';
  try {
    const res = await fetch('/api/get/myintervention', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) { handleLogout(); return; }
    if (!res.ok) { interventions = []; } else { interventions = await res.json(); }
    document.getElementById('itemCount').textContent = interventions.length + ' items';
    renderList();
    if (!document.getElementById('calendarView').classList.contains('hidden')) buildCalendar();
  } catch (err) { 
    console.error('Failed to load interventions:', err);
    container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Connection Error</h3><p>Could not reach the server</p><button onclick="loadInterventions()" style="margin-top:16px;padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;">Retry</button></div>'; 
  }
}

// ═══ VIEW SWITCHING ═══
function switchView(view) {
  document.getElementById('btnList').classList.toggle('active', view === 'list');
  document.getElementById('btnCalendar').classList.toggle('active', view === 'calendar');
  document.getElementById('listView').classList.toggle('hidden', view !== 'list');
  document.getElementById('calendarView').classList.toggle('hidden', view !== 'calendar');
  if (view === 'calendar') buildCalendar();
}

// ═══ LIST RENDERING ═══
function renderList() {
  const el = document.getElementById('listContent');
  if (!interventions.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><h3>No interventions yet</h3><p>Your assigned interventions will appear here</p></div>';
    return;
  }
  el.innerHTML = interventions.map(i => `
    <div class="intervention-card">
      <div class="card-top">
        <div class="card-title">${esc(i.title)}</div>
        <span class="status-badge" style="background:${getStatusColor(i.status)}">${getStatusIcon(i.status)} ${getStatusLabel(i.status)}</span>
      </div>
      <div class="card-meta">
        <div class="meta-row">📍 ${esc(i.location || 'No location')}</div>
        <div class="meta-row">📅 ${formatDate(i.dateStart)}</div>
      </div>
    </div>
  `).join('');
}

// ═══ CALENDAR (same algorithm as MAUI ViewModel) ═══
function buildCalendar() {
  const grid = document.getElementById('calGrid');
  const label = document.getElementById('calMonthLabel');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  label.textContent = months[currentMonth.getMonth()] + ' ' + currentMonth.getFullYear();

  const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  // ISO week: Mon=0
  let startDow = (firstDay.getDay() + 6) % 7;

  const days = [];
  // Previous month fill
  const prevDays = new Date(year, month, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    days.push({ date: new Date(year, month - 1, prevDays - i), current: false });
  }
  // Current month
  const today = new Date(); today.setHours(0,0,0,0);
  for (let d = 1; d <= daysInMonth; d++) {
    days.push({ date: new Date(year, month, d), current: true });
  }
  // Trailing fill to 42 cells
  let trailing = (7 - (days.length % 7)) % 7;
  if (days.length + trailing < 42) trailing = 42 - days.length;
  for (let i = 1; i <= trailing; i++) {
    days.push({ date: new Date(year, month + 1, i), current: false });
  }

  // Auto-select today or first day
  if (!selectedDate || selectedDate.getMonth() !== month || selectedDate.getFullYear() !== year) {
    const todayInMonth = days.find(d => d.current && d.date.getTime() === today.getTime());
    selectedDate = todayInMonth ? todayInMonth.date : new Date(year, month, 1);
  }

  grid.innerHTML = days.map(d => {
    const isToday = d.date.getTime() === today.getTime();
    const isSel = d.date.getTime() === selectedDate.getTime();
    const count = countForDate(d.date);
    let cls = 'cal-day';
    if (!d.current) cls += ' other';
    if (isToday) cls += ' today';
    if (isSel && d.current) cls += ' selected';
    let dots = '';
    if (count > 0) {
      dots = '<div class="cal-dots"><div class="cal-dot"></div>';
      if (count > 1) dots += '<div class="cal-dot green"></div>';
      dots += '</div>';
    }
    return `<div class="${cls}" onclick="selectDay(new Date(${d.date.getTime()}), ${d.current})">${d.date.getDate()}${dots}</div>`;
  }).join('');

  renderDailyList();
}

function changeMonth(dir) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + dir, 1);
  selectedDate = null;
  buildCalendar();
}

function selectDay(date, isCurrent) {
  if (!isCurrent) return;
  selectedDate = date;
  buildCalendar();
}

function countForDate(date) {
  const d = date.getTime();
  return interventions.filter(i => {
    const s = new Date(i.dateStart); s.setHours(0,0,0,0);
    const e = i.dateEnd ? new Date(i.dateEnd) : new Date(s); e.setHours(0,0,0,0);
    return d >= s.getTime() && d <= e.getTime();
  }).length;
}

function renderDailyList() {
  const label = document.getElementById('selectedDayLabel');
  const list = document.getElementById('dailyList');
  if (!selectedDate) { label.textContent = ''; list.innerHTML = ''; return; }
  const opts = { weekday: 'long', month: 'long', day: 'numeric' };
  label.textContent = selectedDate.toLocaleDateString('en-US', opts);
  const d = selectedDate.getTime();
  const daily = interventions.filter(i => {
    const s = new Date(i.dateStart); s.setHours(0,0,0,0);
    const e = i.dateEnd ? new Date(i.dateEnd) : new Date(s); e.setHours(0,0,0,0);
    return d >= s.getTime() && d <= e.getTime();
  });
  if (!daily.length) {
    list.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:14px;">No interventions</div>';
    return;
  }
  list.innerHTML = daily.map(i => `
    <div class="daily-card">
      <div class="daily-card-info">
        <div class="daily-card-title">${esc(i.title)}</div>
        <div class="daily-card-loc">📍 ${esc(i.location || 'No location')}</div>
      </div>
      <span class="status-badge daily-badge" style="background:${getStatusColor(i.status)}">${getStatusLabel(i.status)}</span>
    </div>
  `).join('');
}

// ═══ HELPERS ═══
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
